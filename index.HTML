<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Movie Recommender</title>
  <link rel="stylesheet" href="mrStyle.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <div class="nav-left">
        <a class="brand" href="index.HTML">Movie Recommender</a>
      </div>

      <div class="nav-right" id="navRight">
        <a class="nav-btn" id="loginBtn" href="login.html">Login</a>

        <div class="user-menu-container" id="userMenu" style="display:none;">
          <button class="nav-btn" id="logoutBtn">Logout</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Find movies you'll love</h1>
      <p>Use recommendations, search, and ratings to discover new films.</p>
    </section>

    <section class="movies-section">
      <div class="movies-grid">

        <div class="left-panel">
          <h2>All Movies</h2>

          <button id="toggleViewBtn" class="toggle-btn">Show All Movies</button>
          <div id="pagination" class="pagination"></div>

          <div id="movie-list" class="movie-list"></div>
        </div>

        <aside class="right-panel">
          <h2>Recommended For You</h2>
          <div id="recommendations" class="recommendations"></div>
        </aside>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Movie Recommender</p>
  </footer>

  <script src="mrScript.js"></script>
</body>
</html>
